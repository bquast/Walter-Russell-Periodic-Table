<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiral Periodic Table Demo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050508;
            color: #e0e0ff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 20, 0.85);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #3a3a5a;
            max-width: 320px;
            pointer-events: auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 1.2rem;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a0a0ff;
        }
        p {
            font-size: 0.85rem;
            line-height: 1.4;
            margin: 0 0 15px 0;
            color: #b0b0d0;
        }
        #details {
            background: rgba(20, 20, 40, 0.9);
            padding: 12px;
            border-radius: 6px;
            border-left: 4px solid #00ffcc;
            min-height: 60px;
            font-size: 0.9rem;
        }
        .legend {
            margin-top: 15px;
            font-size: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .color-box {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }
    </style>
    <!-- Three.js and OrbitControls via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="ui-container">
        <h1>Spiral Periodic Table</h1>
        <p>A 3D process of spherical symmetry breaking. Elements expand outward into a geometrical spiral, becoming more unstable the further down they go.</p>
        <div id="details">Hover over a node to read its cosmic frequency data.</div>
        
        <div class="legend">
            <div class="legend-item">
                <div class="color-box" style="background: #ff3366;"></div>
                <span>Key of E Spine</span>
            </div>
            <div class="legend-item">
                <div class="color-box" style="background: #00ffcc;"></div>
                <span>Standard Elements</span>
            </div>
            <div class="legend-item">
                <div class="color-box" style="background: #a020f0;"></div>
                <span>Noble Gases (The Center Spoke)</span>
            </div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // Data mapping elements to Octaves & Tones
        const elementsData = [
            // Octave 3 (Top/Center)
            { symbol: 'H', name: 'Hydrogen', octave: 3, key: 'E', color: 0xff3366, size: 0.2 },
            { symbol: 'He', name: 'Helium', octave: 3, key: 'Hub', color: 0xa020f0, size: 0.2 },
            
            // Octave 4
            { symbol: 'Li', name: 'Lithium', octave: 4, key: 'A', color: 0x00ffcc, size: 0.25 },
            { symbol: 'Be', name: 'Beryllium', octave: 4, key: 'B', color: 0x00ffcc, size: 0.25 },
            { symbol: 'B', name: 'Boron', octave: 4, key: 'C', color: 0x00ffcc, size: 0.25 },
            { symbol: 'C', name: 'Carbon', octave: 4, key: 'E', color: 0xff3366, size: 0.35 },
            { symbol: 'N', name: 'Nitrogen', octave: 4, key: 'F', color: 0x00ffcc, size: 0.25 },
            { symbol: 'O', name: 'Oxygen', octave: 4, key: 'G', color: 0x00ffcc, size: 0.25 },
            { symbol: 'F', name: 'Fluorine', octave: 4, key: 'G#', color: 0x00ffcc, size: 0.25 },
            { symbol: 'Ne', name: 'Neon', octave: 4, key: 'Hub', color: 0xa020f0, size: 0.25 },

            // Octave 5
            { symbol: 'Na', name: 'Sodium', octave: 5, key: 'A', color: 0x00ffcc, size: 0.3 },
            { symbol: 'Mg', name: 'Magnesium', octave: 5, key: 'B', color: 0x00ffcc, size: 0.3 },
            { symbol: 'Al', name: 'Aluminum', octave: 5, key: 'C', color: 0x00ffcc, size: 0.3 },
            { symbol: 'Si', name: 'Silicon', octave: 5, key: 'E', color: 0xff3366, size: 0.4 },
            { symbol: 'P', name: 'Phosphorus', octave: 5, key: 'F', color: 0x00ffcc, size: 0.3 },
            { symbol: 'S', name: 'Sulfur', octave: 5, key: 'G', color: 0x00ffcc, size: 0.3 },
            { symbol: 'Cl', name: 'Chlorine', octave: 5, key: 'G#', color: 0x00ffcc, size: 0.3 },
            { symbol: 'Ar', name: 'Argon', octave: 5, key: 'Hub', color: 0xa020f0, size: 0.3 },

            // Octave 6
            { symbol: 'K', name: 'Potassium', octave: 6, key: 'A', color: 0x00ffcc, size: 0.35 },
            { symbol: 'Ca', name: 'Calcium', octave: 6, key: 'B', color: 0x00ffcc, size: 0.35 },
            { symbol: 'Fe', name: 'Iron', octave: 6, key: 'D', color: 0x00ffcc, size: 0.35 },
            { symbol: 'Co', name: 'Cobalt', octave: 6, key: 'E', color: 0xff3366, size: 0.45 },
            { symbol: 'Ni', name: 'Nickel', octave: 6, key: 'F', color: 0x00ffcc, size: 0.35 },
            { symbol: 'Cu', name: 'Copper', octave: 6, key: 'G', color: 0x00ffcc, size: 0.35 },
            { symbol: 'Kr', name: 'Krypton', octave: 6, key: 'Hub', color: 0xa020f0, size: 0.35 },

            // Octave 7
            { symbol: 'Rb', name: 'Rubidium', octave: 7, key: 'A', color: 0x00ffcc, size: 0.4 },
            { symbol: 'Sr', name: 'Strontium', octave: 7, key: 'B', color: 0x00ffcc, size: 0.4 },
            { symbol: 'Rh', name: 'Rhodium', octave: 7, key: 'E', color: 0xff3366, size: 0.5 },
            { symbol: 'Ag', name: 'Silver', octave: 7, key: 'G', color: 0x00ffcc, size: 0.4 },
            { symbol: 'Xe', name: 'Xenon', octave: 7, key: 'Hub', color: 0xa020f0, size: 0.4 },

            // Octave 8 (Unstable bottom)
            { symbol: 'Cs', name: 'Cesium', octave: 8, key: 'A', color: 0x00ffcc, size: 0.45 },
            { symbol: 'Ba', name: 'Barium', octave: 8, key: 'B', color: 0x00ffcc, size: 0.45 },
            { symbol: 'Ir', name: 'Iridium', octave: 8, key: 'E', color: 0xff3366, size: 0.55 },
            { symbol: 'Au', name: 'Gold', octave: 8, key: 'G', color: 0x00ffcc, size: 0.45 },
            { symbol: 'Rn', name: 'Radon', octave: 8, key: 'Hub', color: 0xa020f0, size: 0.45 }
        ];

        const container = document.getElementById('canvas-container');
        const detailsDiv = document.getElementById('details');
        const scene = new THREE.Scene();
        
        // Camera positioned to view the spiral from an isometric angle
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 25);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x333355);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffffff, 1, 100);
        pointLight.position.set(10, 20, 10);
        scene.add(pointLight);

        // Define angular "spokes"
        const keyAngles = {
            'Hub': 0, // Noble gases aligned down one side
            'A': (2 * Math.PI / 8) * 1,
            'B': (2 * Math.PI / 8) * 2,
            'C': (2 * Math.PI / 8) * 3,
            'E': (2 * Math.PI / 8) * 4, // The vertical harmonic axis on the exact opposite side
            'D': (2 * Math.PI / 8) * 5,
            'F': (2 * Math.PI / 8) * 6,
            'G': (2 * Math.PI / 8) * 7,
            'G#': (2 * Math.PI / 8) * 7.5
        };

        const nodes = [];
        const curvePoints = [];

        // Geometrical Spiral configuration
        const heightMultiplier = -3;  // Determines downward step per octave
        const radiusMultiplier = 2.5; // Determines width of spiral outward per octave

        elementsData.forEach((el) => {
            // Octave 3 is at the top (Y=0), Octave 8 is at the bottom.
            const relativeOctave = el.octave - 3;
            const theta = keyAngles[el.key] || 0;
            
            // To create the spiral continuous curve, we add a fraction of the angle 
            // so elements step downward gradually rather than in flat discs.
            const progression = relativeOctave + (theta / (2 * Math.PI));
            
            const currentRadius = progression * radiusMultiplier;
            const currentY = progression * heightMultiplier;

            // X and Z position based on radius and angle
            const pos = new THREE.Vector3(
                currentRadius * Math.cos(theta),
                currentY,
                currentRadius * Math.sin(theta)
            );

            // Create Node
            const nodeGeo = new THREE.SphereGeometry(el.size, 16, 16);
            const nodeMat = new THREE.MeshPhongMaterial({
                color: el.color,
                emissive: el.color,
                emissiveIntensity: 0.3,
                shininess: 100
            });
            const mesh = new THREE.Mesh(nodeGeo, nodeMat);
            mesh.position.copy(pos);
            mesh.userData = el;
            
            scene.add(mesh);
            nodes.push(mesh);
            curvePoints.push(pos);
        });

        // Generate the dynamic spiral ribbon tracking the progression
        const sortedPoints = [...curvePoints].sort((a, b) => b.y - a.y);
        const curve = new THREE.CatmullRomCurve3(sortedPoints);
        const lineGeo = new THREE.BufferGeometry().setFromPoints(curve.getPoints(300));
        const lineMat = new THREE.LineBasicMaterial({
            color: 0x4444aa,
            transparent: true,
            opacity: 0.6,
            linewidth: 2
        });
        const spiralLine = new THREE.Line(lineGeo, lineMat);
        scene.add(spiralLine);

        // Raycaster for hover interactions
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(nodes);

            if (intersects.length > 0) {
                const target = intersects[0].object.userData;
                detailsDiv.innerHTML = `
                    <strong>${target.name} (${target.symbol})</strong><br/>
                    Octave: ${target.octave} | Key Tone: ${target.key}<br/>
                    ${target.octave > 6 ? '<span style="color: #ffaa00">High Instability / Broken Symmetry</span><br/>' : ''}
                    <span style="color: #ff3366">${target.key === 'E' ? '★ Aligned on the Axis of E' : ''}</span>
                `;
                intersects[0].object.material.emissiveIntensity = 1.0;
            } else {
                nodes.forEach(n => n.material.emissiveIntensity = 0.3);
            }
        }

        window.addEventListener('mousemove', onMouseMove, false);
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            // Rotate the entire group to emphasize the spiral structure
            scene.rotation.y += 0.003;
            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
